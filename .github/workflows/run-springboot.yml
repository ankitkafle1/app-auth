name: Build and Run Spring Boot App on Windows

on:
  push:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: [self-hosted, Windows]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build JAR with Maven
        run: mvn clean package -DskipTests

      - name: Stop existing Spring Boot app
        shell: powershell
        run: |
          $pidFile = Join-Path $env:RUNNER_TEMP "app-auth-springboot.pid"

          if (Test-Path $pidFile) {
            $appPid = Get-Content $pidFile
            $appProcess = Get-Process -Id $appPid -ErrorAction SilentlyContinue
            if ($appProcess) {
              Stop-Process -Id $appPid -Force
              Wait-Process -Id $appPid -Timeout 30 -ErrorAction SilentlyContinue
            }
            Remove-Item $pidFile -Force
          }

          $connection = Get-NetTCPConnection -LocalPort 8080 -State Listen -ErrorAction SilentlyContinue
          if ($connection) {
            throw "Port 8080 is still in use by process ID(s): $($connection.OwningProcess -join ', ')"
          }

      - name: Run Spring Boot app
        shell: powershell
        run: |
          $pidFile = Join-Path $env:RUNNER_TEMP "app-auth-springboot.pid"
          $env:RUNNER_TRACKING_ID = ""
          $appProcess = Start-Process -FilePath "java" -ArgumentList "-jar", "target\app-0.0.1-SNAPSHOT.jar" -WindowStyle Hidden -PassThru
          $appProcess.Id | Set-Content $pidFile
